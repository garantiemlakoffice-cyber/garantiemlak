<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanti Emlak - Yönetim Paneli</title>
    <!-- Tailwind CSS ve FontAwesome ikonları -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- ÜST MENÜ BAR-->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide"><i class="fa-solid fa-building-shield mr-2"></i>GARANTİ EMLAK PANAL</h1>
            <div class="flex items-center gap-4">
                <span id="adminGirisBilgisi" class="text-sm bg-blue-800 px-3 py-1 rounded-full border border-blue-700"></span>
                <button onclick="cikisYap()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-semibold transition">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Çıkış Yap
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        
        <!-- 👑 Sadece TamerC (Admin) İçin Onay Bekleyenler Paneli -->
        <div id="adminOnayBolumu" class="hidden mb-8 bg-white rounded-lg shadow-lg border-t-4 border-amber-500 overflow-hidden">
            <div class="bg-gradient-to-r destruction from-amber-500 to-orange-600 p-4 text-white flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-user-check mr-2"></i> 👑 Sistem Admin Onay Paneli (TamerC)</h2>
                <span id="onayBekleyenSayisi" class="bg-white text-orange-600 font-bold px-3 py-1 rounded-full text-sm">0 Bekleyen</span>
            </div>
            
            <div class="p-6">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Danışman Adı</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Telefon Numarası</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">E-Posta</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Durum</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="onayBekleyenListesi" class="bg-white divide-y divide-gray-200">
                            <!-- JS ile onay bekleyenler buraya dolacak -->
                        </tbody>
                    </table>
                </div>
                <!-- Liste boşsa çıkacak uyarı -->
                <div id="bosListeUyarisi" class="hidden text-center py-8 text-gray-500">
                    <i class="fa-solid fa-circle-check text-4xl text-green-500 mb-2"></i>
                    <p class="text-lg font-medium">Onay bekleyen danışman başvurusu yok!</p>
                </div>
            </div>
        </div>

        <!-- DANIŞMANIN KENDİ İLAN EKLEME ALANI (Normal Panel İçeriği) -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2"><i class="fa-solid fa-plus mr-2"></i>Yeni İlan Ekle</h2>
            <!-- İlan Ekleme Form Elemanları Buraya Gelecek -->
            <p class="text-gray-600 text-sm">Buradan ilanlarınızı ve fotoğraflarınızı yönetebilirsiniz.</p>
        </div>

    </div>

    <!-- SİSTEM JAVASCRIPT KODLARI -->
    <script>
        // Sayfa açıldığında giriş yapanı ve listeyi kontrol et
        document.addEventListener("DOMContentLoaded", function() {
            const aktifKullanici = JSON.parse(localStorage.getItem("aktifKullanici"));
            
            if (!aktifKullanici) {
                alert("Önce giriş yapmalısın kanka!");
                window.location.href = "login.html";
                return;
            }

            // Üst barda kimin giriş yaptığını göster
            document.getElementById("adminGirisBilgisi").innerHTML = `<i class="fa-solid fa-user mr-1"></i> ${aktifKullanici.adSoyad} (${aktifKullanici.rol})`;

            // Eğer tamerC (Admin) girdiyse gizli onay panelini aç ve listeyi yükle
            if (aktifKullanici.kullaniciAdi === "tamerC") {
                document.getElementById("adminOnayBolumu").classList.remove("hidden");
                onayListesiniYenile();
            }
        });

        // Onay bekleyen danışmanları listeleyen fonksiyon
        function onayListesiniYenile() {
            const kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
            const tbody = document.getElementById("onayBekleyenListesi");
            const bosUyari = document.getElementById("bosListeUyarisi");
            
            // Sadece rolü 'Danışman' olan ve durumu 'Bekliyor' olanları filtrele
            const bekleyenler = kullanicilar.filter(user => user.rol === "Danışman" && user.durum === "Bekliyor");
            
            // Sayaç güncelle
            document.getElementById("onayBekleyenSayisi").textContent = `${bekleyenler.length} Bekleyen`;
            
            tbody.innerHTML = "";

            if (bekleyenler.length === 0) {
                bosUyari.classList.remove("hidden");
                return;
            } else {
                bosUyari.classList.add("hidden");
            }

            bekleyenler.forEach(user => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-950">${user.adSoyad}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${user.telefon || 'Belirtilmedi'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${user.eposta || 'Belirtilmedi'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        <span class="px-2.5 py-1 text-xs font-semibold rounded-full bg-amber-100 text-amber-800 border border-amber-200 animate-pulse">
                            Onay Bekliyor
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium flex justify-center gap-2">
                        <button onclick="danismanOnayla('${user.kullaniciAdi}')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded flex items-center gap-1 shadow transition">
                            <i class="fa-solid fa-check"></i> Onayla
                        </button>
                        <button onclick="danismanReddet('${user.kullaniciAdi}')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded flex items-center gap-1 shadow transition">
                            <i class="fa-solid fa-trash"></i> Sil
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Danışmanı aktif etme fonksiyonu
        function danismanOnayla(kullaniciAdi) {
            let kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
            
            kullanicilar = kullanicilar.map(user => {
                if (user.kullaniciAdi === kullaniciAdi) {
                    user.durum = "Aktif";
                }
                return user;
            });

            localStorage.setItem("kullanicilar", JSON.stringify(kullanicilar));
            alert("Danışman başarıyla onaylandı! Artık sisteme girip ilan ekleyebilir.");
            onayListesiniYenile(); // Listeyi anlık güncelle
        }

        // Başvuruyu reddedip silme fonksiyonu
        function danismanReddet(kullaniciAdi) {
            if (confirm("Bu danışman başvurusunu tamamen silmek istediğine emin misin?")) {
                let kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
                kullanicilar = kullanicilar.filter(user => user.kullaniciAdi !== kullaniciAdi);
                
                localStorage.setItem("kullanicilar", JSON.stringify(kullanicilar));
                alert("Başvuru silindi.");
                onayListesiniYenile(); // Listeyi anlık güncelle
            }
        }

        // Çıkış yapma fonksiyonu
        function cikisYap() {
            localStorage.removeItem("aktifKullanici");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
