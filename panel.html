<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli - Garanti Emlak</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-[#486484] text-white p-4 shadow-md flex justify-between items-center">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wider text-[#ffe800]">GARANTİ EMLAK YÖNETİM</a>
            <a href="index.html" class="text-xs font-semibold bg-gray-700 px-3 py-1.5 rounded hover:bg-gray-600">Sitiye Dön ➔</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto mt-6 px-4 space-y-6">
        
        <!-- ADMIN PANELİ -->
        <section id="adminSection" class="hidden bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-orange-600 border-b pb-2 mb-4">👑 Sistem Admin Onay Paneli (tamerC)</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 font-bold border-b">
                            <th class="p-3">Danışman Adı</th>
                            <th class="p-3">Telefon</th>
                            <th class="p-3">Rol</th>
                            <th class="p-3">Durum</th>
                            <th class="p-3 text-right">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="pendingAgentsTable" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <!-- İLAN EKLEME PANELİ -->
        <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">➕ Yeni İlan Girişi (Sahibinden Formatı)</h2>
            <form onsubmit="addListing(event)" class="grid grid-cols-2 gap-4 text-xs">
                <div class="col-span-2">
                    <label class="font-semibold text-gray-600 block mb-1">İlan Başlığı</label>
                    <input type="text" id="listTitle" required placeholder="Örn: Tarsus Gazipaşa Bulvarında Satılık Acele 3+1" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="font-semibold text-gray-600 block mb-1">Fiyat (TL)</label>
                    <input type="number" id="listPrice" required placeholder="Fiyat girin" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="font-semibold text-gray-600 block mb-1">Metrekare (m²)</label>
                    <input type="number" id="listM2" required placeholder="Örn: 135" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="font-semibold text-gray-600 block mb-1">Şehir</label>
                    <select id="listCity" class="w-full border p-2 rounded bg-white">
                        <option value="Mersin">Mersin</option>
                        <option value="Adana">Adana</option>
                    </select>
                </div>
                <div>
                    <label class="font-semibold text-gray-600 block mb-1">İlçe / Mahalle</label>
                    <input type="text" id="listDistrict" required placeholder="Örn: Tarsus / Gazipaşa" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="font-semibold text-gray-600 block mb-1">Oda Sayısı</label>
                    <select id="listRooms" class="w-full border p-2 rounded bg-white">
                        <option value="1+1">1+1</option>
                        <option value="2+1">2+1</option>
                        <option value="3+1">3+1</option>
                        <option value="4+1">4+1</option>
                    </select>
                </div>
                <div>
                    <!-- OTOMATİK BOYUTLANDIRMALI FOTOĞRAF YÜKLEME SİSTEMİ -->
                    <label class="font-semibold text-gray-800 block mb-1 text-blue-600">📸 Telefon / Bilgisayardan Fotoğraf Seç (Otomatik Optimize Edilir)</label>
                    <input type="file" id="listImageFile" accept="image/*" class="w-full border p-1.5 rounded bg-gray-50 cursor-pointer">
                </div>
                <div class="col-span-2">
                    <label class="font-semibold text-gray-600 block mb-1">Detaylı İlan Açıklaması</label>
                    <textarea id="listDesc" rows="4" placeholder="İlan detaylarını, binanın yaşını, konum avantajlarını buraya yazın..." class="w-full border p-2 rounded"></textarea>
                </div>
                <div class="col-span-2">
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-3 rounded shadow text-sm">İlanı Eksiksiz Olarak Canlıya Al</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        let currentUser = null;
        let base64Image = "";

        function checkAuth() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if(!currentUser || (currentUser.role !== 'admin' && currentUser.role !== 'agent')) {
                alert('Bu sayfaya erişim yetkiniz yok!');
                window.location.href = 'index.html';
                return;
            }
            if(currentUser.role === 'admin') {
                document.getElementById('adminSection').classList.remove('hidden');
                renderPendingAgents();
            }

            // Dosya yükleme olayını dinle ve anında base64'e çevir (Boyutla uğraştırmaz)
            document.getElementById('listImageFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        base64Image = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function renderPendingAgents() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const pending = users.filter(u => u.role === 'agent' && !u.isApproved);
            const tbody = document.getElementById('pendingAgentsTable');

            if(pending.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-400">Onay bekleyen danışman başvurusu yok.</td></tr>`;
                return;
            }

            let html = '';
            pending.forEach(agent => {
                html += `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 font-semibold">${agent.username}</td>
                    <td class="p-3">${agent.phone || '-'}</td>
                    <td class="p-3 text-blue-600 font-bold">${agent.role}</td>
                    <td class="p-3"><span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[10px] font-bold">Onay Bekliyor</span></td>
                    <td class="p-3 text-right space-x-2">
                        <button onclick="approveAgent('${agent.username}', true)" class="bg-green-600 text-white px-2.5 py-1 rounded hover:bg-green-700 font-bold">Onayla</button>
                        <button onclick="approveAgent('${agent.username}', false)" class="bg-red-600 text-white px-2.5 py-1 rounded hover:bg-red-700 font-bold">Reddet</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function approveAgent(username, status) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if(status) {
                users = users.map(u => u.username === username ? { ...u, isApproved: true } : u);
                alert(`${username} onaylandı.`);
            } else {
                users = users.filter(u => u.username !== username);
            }
            localStorage.setItem('users', JSON.stringify(users));
            renderPendingAgents();
        }

        function addListing(e) {
            e.preventDefault();
            const title = document.getElementById('listTitle').value.trim();
            const price = document.getElementById('listPrice').value;
            const m2 = document.getElementById('listM2').value;
            const city = document.getElementById('listCity').value;
            const district = document.getElementById('listDistrict').value.trim();
            const rooms = document.getElementById('listRooms').value;
            const desc = document.getElementById('listDesc').value.trim();

            const randomNo = Math.floor(100000 + Math.random() * 900000);
            let listings = JSON.parse(localStorage.getItem('listings')) || [];

            const newListing = {
                listingNo: randomNo,
                title: title,
                price: Number(price),
                m2: m2,
                city: city,
                district: district,
                rooms: rooms,
                desc: desc,
                agent: currentUser.username,
                image: base64Image || 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=600&q=80'
            };

            listings.unshift(newListing);
            localStorage.setItem('listings', JSON.stringify(listings));

            alert(`Mükemmel! İlan başarıyla yayınlandı. İlan No: ${randomNo}`);
            window.location.href = 'index.html';
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
