<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanti Emlak - Sahibinden Tarzı Emlak Platformu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Üst Menü / Navbar -->
    <nav class="bg-[#486484] text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-6 max-w-7xl mx-auto w-full justify-between">
            <div class="flex items-center space-x-6">
                <a href="index.html" class="text-2xl font-bold tracking-wider text-[#ffe800]">GARANTİ EMLAK</a>
                <!-- İlan No ile Arama Sistemi -->
                <div class="flex">
                    <input type="text" id="searchListingNo" placeholder="İlan No ile Ara..." class="p-2 text-black rounded-l w-64 focus:outline-none text-sm">
                    <button onclick="searchByNo()" class="bg-[#ffe800] text-black px-4 font-bold rounded-r hover:bg-yellow-500 text-sm">Ara</button>
                </div>
            </div>
            
            <div class="flex space-x-4 items-center">
                <span id="welcomeMsg" class="text-sm font-semibold hidden"></span>
                <a href="login.html" id="loginBtn" class="bg-[#039be5] text-white px-4 py-2 rounded text-xs font-bold hover:bg-cyan-600 shadow">Giriş Yap / Kayıt Ol</a>
                <a href="panel.html" id="panelBtn" class="bg-yellow-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-yellow-700 shadow hidden">Yönetim Paneli</a>
                <button onclick="logout()" id="logoutBtn" class="bg-red-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-red-700 hidden">Çıkış</button>
            </div>
        </div>
    </nav>

    <!-- Ana İçerik Alanı -->
    <div class="max-w-7xl mx-auto flex mt-4 px-4 gap-4">
        
        <!-- Sol Taraf: Filtreleme ve Danışmanlar -->
        <aside class="w-1/4 space-y-4">
            <!-- Filtreleme Sistemi -->
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-700 border-b pb-2 mb-3 text-sm flex items-center justify-between">
                    <span>Detaylı Filtre</span>
                    <button onclick="clearFilters()" class="text-xs text-blue-600 hover:underline">Temizle</button>
                </h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">Şehir</label>
                        <select id="filterCity" onchange="applyFilters()" class="w-full border p-2 rounded text-xs bg-white">
                            <option value="">Tümü</option>
                            <option value="Mersin">Mersin</option>
                            <option value="Adana">Adana</option>
                            <option value="İstanbul">İstanbul</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">Oda Sayısı</label>
                        <select id="filterRooms" onchange="applyFilters()" class="w-full border p-2 rounded text-xs bg-white">
                            <option value="">Tümü</option>
                            <option value="1+1">1+1</option>
                            <option value="2+1">2+1</option>
                            <option value="3+1">3+1</option>
                            <option value="4+1">4+1</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Danışmanlar Listesi -->
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-700 border-b pb-2 mb-3 text-sm">Gayrimenkul Danışmanları</h3>
                <ul id="agentsList" class="space-y-1">
                    <!-- Dinamik yüklenecek -->
                </ul>
            </div>
        </aside>

        <!-- Sağ Taraf: İlanlar Listesi -->
        <main class="w-3/4">
            <div class="border border-gray-200 rounded shadow-sm bg-white">
                <div class="bg-gray-50 p-3 font-bold text-gray-700 border-b border-gray-200 text-xs flex justify-between items-center">
                    <span>Tüm İlanlar</span>
                    <span id="listingCount" class="text-gray-500 font-normal">0 sonuç bulundu</span>
                </div>
                
                <!-- İlan Kartları Yuvası -->
                <div id="listingsWrapper" class="divide-y divide-gray-100">
                    <!-- Dinamik İlanlar Buraya Gelecek -->
                </div>
            </div>
        </main>

    </div>

    <!-- Veritabanı ve Mantık Scripti -->
    <script>
        // Örnek Başlangıç Verileri (Eğer hafıza boşsa yüklenecek)
        if(!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([
                { username: 'tamerC', password: 'TamerC', role: 'admin', isApproved: true },
                { username: 'ahmet_danisman', password: '123', role: 'agent', isApproved: true, phone: '0532 111 2233' },
                { username: 'mehmet_emlak', password: '123', role: 'agent', isApproved: false, phone: '0544 222 4455' }
            ]));
        }
        if(!localStorage.getItem('listings')) {
            localStorage.setItem('listings', JSON.stringify([
                { listingNo: 482910, title: 'Tarsus Kırklarsırtı Mahallesinde Satılık Lüx 3+1 Daire', price: 2850000, city: 'Mersin', district: 'Tarsus', rooms: '3+1', agent: 'ahmet_danisman', image: 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=300&q=80' },
                { listingNo: 719204, title: 'Gazipaşa Bulvarı Üzerinde Devren Satılık Mağaza / Dükkan', price: 1250000, city: 'Mersin', district: 'Tarsus', rooms: 'Dükkan', agent: 'ahmet_danisman', image: 'https://images.unsplash.com/photo-1582037928867-67704ea56333?auto=format&fit=crop&w=300&q=80' }
            ]));
        }

        let selectedAgent = null;

        function initPage() {
            // Giriş kontrolü
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if(currentUser) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('welcomeMsg').classList.remove('hidden');
                document.getElementById('welcomeMsg').innerText = `Hoş geldin, ${currentUser.username}`;
                document.getElementById('logoutBtn').classList.remove('hidden');
                if(currentUser.role === 'admin' || currentUser.role === 'agent') {
                    document.getElementById('panelBtn').classList.remove('hidden');
                }
            }

            renderAgents();
            renderListings();
        }

        function renderAgents() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const approvedAgents = users.filter(u => u.role === 'agent' && u.isApproved);
            const listContainer = document.getElementById('agentsList');
            
            let html = `<li onclick="selectAgent(null)" class="p-2 rounded cursor-pointer text-xs font-semibold transition ${!selectedAgent ? 'bg-[#ffe800] text-black' : 'hover:bg-gray-100'}">🌟 Tüm İlanlar</li>`;
            
            approvedAgents.forEach(agent => {
                html += `<li onclick="selectAgent('${agent.username}')" class="p-2 rounded cursor-pointer text-xs font-medium transition ${selectedAgent === agent.username ? 'bg-[#486484] text-white font-bold' : 'hover:bg-gray-100'}">👤 ${agent.username}</li>`;
            });
            listContainer.innerHTML = html;
        }

        function renderListings(filteredListings = null) {
            const listings = filteredListings || JSON.parse(localStorage.getItem('listings')) || [];
            const wrapper = document.getElementById('listingsWrapper');
            document.getElementById('listingCount').innerText = `${listings.length} sonuç bulundu`;

            if(listings.length === 0) {
                wrapper.innerHTML = `<div class="p-8 text-center text-gray-500 text-sm">Aradığınız kriterlere uygun ilan bulunamadı.</div>`;
                return;
            }

            let html = '';
            listings.forEach(item => {
                html += `
                <div class="flex border-b border-gray-100 py-3 hover:bg-yellow-50/50 transition px-3 items-center">
                    <img src="${item.image || 'https://via.placeholder.com/140x100?text=Garanti+Emlak'}" alt="" class="w-32 h-20 object-cover rounded border border-gray-200 shadow-sm">
                    <div class="flex-1 ml-4">
                        <h4 class="text-blue-700 font-bold text-sm hover:underline cursor-pointer">${item.title}</h4>
                        <p class="text-[11px] text-gray-400 mt-0.5">İlan No: <span class="font-bold text-gray-600">${item.listingNo}</span></p>
                        <p class="text-xs text-gray-600 mt-1">${item.city} / ${item.district} / ${item.rooms}</p>
                    </div>
                    <div class="text-right pr-2">
                        <span class="text-blue-900 font-bold text-base">${Number(item.price).toLocaleString('tr-TR')} TL</span>
                        <p class="text-[10px] text-gray-400 mt-2">Danışman: <span class="font-semibold text-gray-600">${item.agent}</span></p>
                    </div>
                </div>`;
            });
            wrapper.innerHTML = html;
        }

        function selectAgent(agentName) {
            selectedAgent = agentName;
            renderAgents();
            applyFilters();
        }

        function applyFilters() {
            let listings = JSON.parse(localStorage.getItem('listings')) || [];
            const city = document.getElementById('filterCity').value;
            const rooms = document.getElementById('filterRooms').value;

            if(selectedAgent) {
                listings = listings.filter(l => l.agent === selectedAgent);
            }
            if(city) {
                listings = listings.filter(l => l.city === city);
            }
            if(rooms) {
                listings = listings.filter(l => l.rooms === rooms);
            }

            renderListings(listings);
        }

        function searchByNo() {
            const no = document.getElementById('searchListingNo').value.trim();
            if(!no) { applyFilters(); return; }
            let listings = JSON.parse(localStorage.getItem('listings')) || [];
            listings = listings.filter(l => l.listingNo.toString() === no);
            renderListings(listings);
        }

        function clearFilters() {
            document.getElementById('filterCity').value = '';
            document.getElementById('filterRooms').value = '';
            selectedAgent = null;
            renderAgents();
            renderListings();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.reload();
        }

        window.onload = initPage;
    </script>
</body>
</html>
