<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanti Emlak & İnşaat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; }
        body { width: 100%; overflow-x: hidden; background-color: #ffffff; color: #333333; }
        .header-wrapper { width: 100%; background-color: #ffffff; border-bottom: 1px solid #f5f5f5; position: sticky; top: 0; z-index: 1000; }
        .custom-header { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .logo-box { display: flex; align-items: center; gap: 10px; text-decoration: none; cursor: pointer; }
        .logo-text-bold { font-size: 32px; font-weight: 800; color: #057f2b; letter-spacing: -1.5px; line-height: 1; }
        .logo-text-sub { font-size: 11px; font-weight: 700; color: #1a2a3a; line-height: 1.3; border-left: 2px solid #cccccc; padding-left: 10px; letter-spacing: 1px; }
        .menu-links { display: flex; gap: 32px; align-items: center; }
        .menu-links a { text-decoration: none; color: #222222; font-size: 13.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; transition: color 0.2s ease; }
        .menu-links a:hover { color: #057f2b; }
        .lang-btn { background-color: #057f2b; color: white; padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .hamburger-menu { display: none; flex-direction: column; gap: 6px; cursor: pointer; }
        .hamburger-menu span { width: 30px; height: 3px; background-color: #1a2a3a; transition: all 0.3s ease; }
        .main-hero { position: relative; width: 100%; height: 85vh; background-color: #111111; overflow: hidden; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center; filter: brightness(0.65); }
        .hero-overlay-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding-left: 10%; padding-right: 10%; background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 70%); z-index: 5; }
        .slide-tagline { font-size: 26px; color: #057f2b; font-weight: 500; margin-bottom: 10px; }
        .slide-title { font-size: 64px; font-weight: 700; color: #ffffff; margin-bottom: 35px; }
        .slide-action-btn { display: inline-flex; align-items: center; gap: 12px; padding: 14px 35px; border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.08); color: #ffffff; border-radius: 30px; text-decoration: none; font-size: 14px; backdrop-filter: blur(8px); }
        .section-wrapper { max-width: 1440px; margin: 0 auto; padding: 80px 40px; }
        .section-main-title { font-size: 32px; font-weight: 700; margin-bottom: 45px; position: relative; }
        .section-main-title::after { content: ''; position: absolute; bottom: -12px; left: 0; width: 60px; height: 3px; background-color: #057f2b; }
        .about-container { display: flex; gap: 50px; align-items: center; }
        .about-img { flex: 1; width: 100%; height: 400px; object-fit: cover; border-radius: 12px; }
        .listings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .project-card { position: relative; height: 480px; border-radius: 12px; overflow: hidden; }
        .project-card-img { width: 100%; height: 100%; object-fit: cover; }
        .project-card-overlay { position: absolute; bottom: 0; width: 100%; padding: 35px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="custom-header">
            <a href="#anasayfa" class="logo-box">
                <div class="logo-text-bold">GARANTİ</div>
                <div class="logo-text-sub">EMLAK<br>İNŞAAT</div>
            </a>
            <div class="menu-links" id="navLinks">
                <a href="#anasayfa">Anasayfa</a>
                <a href="#kurumsal">Kurumsal</a>
                <a href="#projelerimiz">Projelerimiz</a>
                <a href="#galeri">Galeri</a>
                <a href="#iletisim">İletişim</a>
            </div>
        </div>
    </div>

    <div class="main-hero" id="anasayfa">
        <img src="https://i.ibb.co/hK8b3h4S/IMG-20260621-WA0004.jpg" class="hero-img" alt="Ana Görsel">
        <div class="hero-overlay-content">
            <div class="slide-tagline">Doğayla İç İçe,</div>
            <div class="slide-title">Modern Yaşam</div>
            <a href="#projelerimiz" class="slide-action-btn">Projeleri İncele &nbsp; ➔</a>
        </div>
    </div>

    <div class="section-wrapper" id="kurumsal">
        <div class="section-main-title">KURUMSAL</div>
        <div class="about-container">
            <div class="about-text">
                <p><strong>Garanti Emlak & İnşaat</strong> olarak, gayrimenkul ve inşaat sektöründe güvenin adresiyiz.</p>
            </div>
            <img src="https://images.unsplash.com/photo-1582407947304-fd86f028f716?auto=format&fit=crop&w=800&q=80" class="about-img">
        </div>
    </div>

</body>
</html>
