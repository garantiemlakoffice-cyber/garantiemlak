<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanti Emlak - Danışman Başvurusu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-4 border-amber-500">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 flex justify-center items-center gap-2">
                <i class="fa-solid fa-user-plus text-amber-500"></i> Danışman Kayıt Formu
            </h1>
            <p class="text-gray-500 text-sm mt-1">Bilgilerinizi doldurun, admin onayından sonra paneliniz açılsın.</p>
        </div>
        
        <form id="registerForm" onsubmit="basvuruYap(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Adınız Soyadınız</label>
                <input type="text" id="regName" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Telefon Numaranız</label>
                <input type="tel" id="regPhone" placeholder="0555..." required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">E-Posta Adresiniz</label>
                <input type="email" id="regEmail" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">İstediğiniz Kullanıcı Adı</label>
                <input type="text" id="regUsername" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Şifre</label>
                <input type="password" id="regPassword" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 rounded-md transition shadow">
                Başvuruyu Gönder
            </button>
        </form>
        
        <div class="mt-4 text-center border-t pt-4">
            <a href="login.html" class="text-sm text-gray-600 hover:text-blue-900 font-semibold"><i class="fa-solid fa-arrow-left"></i> Giriş Ekranına Dön</a>
        </div>
    </div>

    <script>
        function basvuruYap(e) {
            e.preventDefault();
            const username = document.getElementById("regUsername").value.trim();
            let kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
            
            if (kullanicilar.some(u => u.kullaniciAdi === username)) {
                alert("Bu kullanıcı adı zaten alınmış kanka, başka bir tane dene!");
                return;
            }
            
            const yeniDanisman = {
                adSoyad: document.getElementById("regName").value.trim(),
                telefon: document.getElementById("regPhone").value.trim(),
                eposta: document.getElementById("regEmail").value.trim(),
                kullaniciAdi: username,
                sifre: document.getElementById("regPassword").value,
                rol: "Danışman",
                durum: "Bekliyor"
            };
            
            kullanicilar.push(yeniDanisman);
            localStorage.setItem("kullanicilar", JSON.stringify(kullanicilar));
            
            alert("Başvurunuz alındı! Şimdi Admin (tamerC) paneline girip sizi onayladığında sisteme giriş yapabileceksiniz.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
