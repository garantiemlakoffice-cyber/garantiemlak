<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap / Üye Ol - Garanti Emlak</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <nav class="bg-[#486484] text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto"><a href="index.html" class="text-2xl font-bold tracking-wider text-[#ffe800]">GARANTİ EMLAK</a></div>
    </nav>

    <div class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-200">
            <!-- Tab Seçimi -->
            <div class="flex border-b mb-6 text-center">
                <button id="tabLogin" onclick="switchTab('login')" class="w-1/2 pb-2 font-bold text-blue-600 border-b-2 border-blue-600 text-sm">Giriş Yap</button>
                <button id="tabRegister" onclick="switchTab('register')" class="w-1/2 pb-2 font-bold text-gray-400 text-sm">Kayıt Ol / Başvur</button>
            </div>

            <!-- GİRİŞ FORMU -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Kullanıcı Adı</label>
                    <input type="text" id="loginUser" required class="w-full border p-2 rounded text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Şifre</label>
                    <input type="password" id="loginPass" required class="w-full border p-2 rounded text-sm focus:outline-blue-500">
                </div>
                <button type="submit" class="w-full bg-[#486484] hover:bg-slate-700 text-white p-2.5 rounded font-bold text-sm shadow">Giriş Yap</button>
            </form>

            <!-- KAYIT FORMU -->
            <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Kullanıcı Adı</label>
                    <input type="text" id="regUser" required class="w-full border p-2 rounded text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Şifre</label>
                    <input type="password" id="regPass" required class="w-full border p-2 rounded text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Telefon Numarası</label>
                    <input type="text" id="regPhone" placeholder="05xx xxx xxxx" required class="w-full border p-2 rounded text-sm focus:outline-blue-500">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-600 block mb-1">Üyelik Tipi</label>
                    <select id="regRole" class="w-full border p-2 rounded text-sm bg-white focus:outline-blue-500">
                        <option value="user">Standart Üye (Anında Açılır)</option>
                        <option value="agent">Gayrimenkul Danışmanı (Admin Onayı Bekler)</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white p-2.5 rounded font-bold text-sm shadow">Kayıt Ol / Başvuruyu İlet</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('tabLogin').className = "w-1/2 pb-2 font-bold text-blue-600 border-b-2 border-blue-600 text-sm";
                document.getElementById('tabRegister').className = "w-1/2 pb-2 font-bold text-gray-400 text-sm";
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('tabLogin').className = "w-1/2 pb-2 font-bold text-gray-400 text-sm";
                document.getElementById('tabRegister').className = "w-1/2 pb-2 font-bold text-blue-600 border-b-2 border-blue-600 text-sm";
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;

            const users = JSON.parse(localStorage.getItem('users')) || [];
            const matched = users.find(u => u.username === user && u.password === pass);

            if(!matched) {
                alert('Hatalı kullanıcı adı veya şifre!');
                return;
            }

            if(!matched.isApproved) {
                alert('Danışmanlık hesabınız henüz admin (tamerC) tarafından onaylanmamıştır!');
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify(matched));
            alert('Giriş başarılı! Ana sayfaya yönlendiriliyorsunuz.');
            window.location.href = 'index.html';
        }

        function handleRegister(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value;
            const phone = document.getElementById('regPhone').value.trim();
            const role = document.getElementById('regRole').value;

            let users = JSON.parse(localStorage.getItem('users')) || [];
            if(users.some(u => u.username === user)) {
                alert('Bu kullanıcı adı zaten alınmış!');
                return;
            }

            const newUser = {
                username: user,
                password: pass,
                phone: phone,
                role: role,
                isApproved: role !== 'agent' // Danışmanlar onaysız başlar
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            if(role === 'agent') {
                alert('Danışmanlık başvurunuz başarıyla alındı! Admin (tamerC) onayından sonra giriş yapabilirsiniz.');
            } else {
                alert('Kaydınız tamamlandı! Şimdi giriş yapabilirsiniz.');
            }
            switchTab('login');
        }
    </script>
</body>
</html>
