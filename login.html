<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garanti Emlak - Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border-t-4 border-blue-900">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-900 flex justify-center items-center gap-2">
                <i class="fa-solid fa-building-circle-check"></i> GARANTİ EMLAK
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Yönetim Paneline Giriş Yapın</p>
        </div>
        
        <form id="loginForm" onsubmit="sistemeGirisYap(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kullanıcı Adı</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="loginUsername" required class="w-full pl-10 pr-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-900">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Şifre</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="loginPassword" required class="w-full pl-10 pr-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-900">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2 rounded-md transition shadow">
                Giriş Yap
            </button>
        </form>
        
        <div class="mt-6 text-center border-t pt-4">
            <p class="text-sm text-gray-600">Danışman olarak ekibimize katılmak ister misiniz?</p>
            <a href="register.html" class="text-sm text-blue-700 font-bold hover:underline block mt-1">Hemen Danışman Başvurusu Yap</a>
        </div>
    </div>

    <script>
        // Sistem kurucu hesap tanımı ve başlangıç verisi kontrolü
        document.addEventListener("DOMContentLoaded", function() {
            let kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
            
            // tamerC hesabı yoksa sisteme inject et
            const adminMevcut = kullanicilar.find(u => u.kullaniciAdi === "tamerC");
            if (!adminMevcut) {
                kullanicilar.push({
                    adSoyad: "Tamer Can",
                    kullaniciAdi: "tamerC",
                    sifre: "TamerC",
                    rol: "Admin",
                    durum: "Aktif"
                });
                localStorage.setItem("kullanicilar", JSON.stringify(kullanicilar));
            }
        });

        function sistemeGirisYap(e) {
            e.preventDefault();
            const kAdi = document.getElementById("loginUsername").value.trim();
            const sifre = document.getElementById("loginPassword").value;
            
            const kullanicilar = JSON.parse(localStorage.getItem("kullanicilar")) || [];
            const user = kullanicilar.find(u => u.kullaniciAdi === kAdi && u.sifre === sifre);
            
            if (!user) {
                alert("Hatalı kullanıcı adı veya şifre girdin kanka!");
                return;
            }
            
            if (user.durum === "Bekliyor") {
                alert("Hesabınız henüz kurucu (tamerC) tarafından onaylanmamıştır. Lütfen onay bekleyin.");
                return;
            }
            
            localStorage.setItem("aktifKullanici", JSON.stringify(user));
            window.location.href = "panel.html";
        }
    </script>
</body>
</html>
